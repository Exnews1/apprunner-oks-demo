version: 1.0
runtime: nodejs18

build:
  commands:
    build:
      # Install backend dependencies
      - npm install
      # Install frontend dependencies and build the static React bundle
      - cd frontend && npm install && npm run build
  
run:
  # Start the Express server which serves both the API and the built React frontend
  command: node server.js
  network:
    port: 3000
    env: APP_PORT
  env:
    # These must be overridden in the AWS App Runner console with your external database credentials!
    - name: NODE_ENV
      value: production
